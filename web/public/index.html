<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local File Sharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="top-nav">
    <div class="logo">
        <span class="material-icons-outlined logo-icon">cloud</span>
        <span>Local Drive</span>
    </div>
    <div class="header-center"></div>
    <div class="nav-actions">
        <button class="icon-btn" id="refreshBtn" title="Refresh"><span class="material-icons-outlined">refresh</span></button>
    </div>
</header>

<div class="main-container">
    <main class="content-area">
        <div class="toolbar">
            <div class="upload-area-small" id="uploadArea">
                <span class="material-icons-outlined">cloud_upload</span>
                <span>Drop files here or click to upload</span>
                <input type="file" id="fileInput" multiple>
            </div>
            <div class="toolbar-actions">
                <div class="sort-dropdown">
                    <select id="sortSelect" class="sort-select">
                        <option value="time_desc">Modified (Newest)</option>
                        <option value="time_asc">Modified (Oldest)</option>
                        <option value="size_desc">Size (Largest)</option>
                        <option value="size_asc">Size (Smallest)</option>
                        <option value="name_asc">Name (A-Z)</option>
                    </select>
                </div>
                <div class="layout-toggle">
                    <button class="icon-btn active" id="btnList" title="List layout"><span class="material-icons-outlined">view_list</span></button>
                    <button class="icon-btn" id="btnGrid" title="Grid layout"><span class="material-icons-outlined">grid_view</span></button>
                </div>
            </div>
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="files-container list-view" id="fileGrid">
            <!-- Files injected here -->
        </div>
    </main>
</div>

<script src="js/notification.js"></script>
<script src="js/upload.js"></script>
<script src="js/fileManager.js"></script>
<script src="js/app.js"></script>
</body>
</html>
